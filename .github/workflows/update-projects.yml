name: Update projects list

on:
  push:
    branches: [main]
    paths:
      - 'projects/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate projects.json
        run: |
          mkdir -p projects
          echo '[' > projects.json
          first=true
          for d in projects/*/; do
            name=$(basename "$d")
            [ "$name" = "*" ] && continue
            if [ "$first" = true ]; then first=false; else echo ',' >> projects.json; fi
            # try to read a title from README.md first line, fallback to dir name
            title="$name"
            if [ -f "$d/README.md" ]; then
              t=$(grep -m1 -E '^#' "$d/README.md" | sed -E 's/^#+\s*//')
              [ -n "$t" ] && title="$t"
            fi
            printf '{"name": %s, "title": %s, "path": %s}' \
              "$(jq -Rn --arg s "$name" '$s')" \
              "$(jq -Rn --arg s "$title" '$s')" \
              "$(jq -Rn --arg s "$name" '$s')" >> projects.json
          done
          echo ']' >> projects.json
          cat projects.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.json
          git diff --staged --quiet || git commit -m "Update projects.json [skip ci]"
          git push
