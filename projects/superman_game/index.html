<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Superman Flight</title>
<style>
  html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; }
  body { background:#1a2a4a; display:flex; justify-content:center; align-items:center; font-family:sans-serif; }
  #game-container {
    position:relative;
    width:480px; height:640px;
    background:linear-gradient(#1a2a6c,#3a6cb0);
    border:2px solid #fff;
    box-sizing:content-box;
    transform-origin: center center;
  }
  #game { position:relative; z-index:1; background:transparent; }
  canvas#fireworks { background:transparent; }
  #moon-svg { position:absolute; top:0; left:0; z-index:0; pointer-events:none; }
  #fireworks { position:absolute; top:0; left:0; z-index:2; pointer-events:none; border:none; background:transparent; }
  #overlay { position:absolute; top:8px; left:0; right:0; color:#fff; text-align:center; font-size:20px; pointer-events:none; z-index:3; }
  #gameover { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  #gameover-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#00ff44; font-size:48px; font-weight:bold; text-align:center; text-shadow:0 0 10px #000; pointer-events:none; z-index:3; }
</style>
</head>
<body>
<div id="game-container">
<svg id="moon-svg" width="480" height="640" viewBox="0 0 480 640" xmlns="http://www.w3.org/2000/svg">
  <g id="moon-group">
    <path id="moonback" fill="#2a2a40"></path>
    <path id="moonlit" fill="#fdf6d8"></path>
  </g>
</svg>
<canvas id="game" width="480" height="640" style="position:relative;z-index:1;"></canvas>
<canvas id="fireworks" width="480" height="640" style="position:absolute;top:0;left:0;pointer-events:none;z-index:2;"></canvas>
<div id="overlay"></div>
<div id="gameover-text"></div>
</div>
<script src="options.js"></script>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const gameoverText = document.getElementById('gameover-text');
const fwCanvas = document.getElementById('fireworks');
const fwCtx = fwCanvas.getContext('2d');
let fireworks = [];
let particles = [];
let raindrops = [];
let frameCount = 0;

// Port of tingletech/moon-phase lunar phase calculation
// Returns a value 0-1: 0 and 1 = new moon, 0.5 = full moon
function getMoonPhase(date) {
  const year = date.getFullYear();
  const month = date.getMonth() + 1;
  const day = date.getDate();

  let c, e, jd, b;
  if (month < 3) {
    c = year - 1;
    e = month + 12;
  } else {
    c = year;
    e = month;
  }
  c += 4716;
  e += 1;
  jd = Math.floor(365.25 * c) + Math.floor(30.6 * e) + day - 1524.5;

  b = (jd - 2451550.1) / 29.530588853;
  b = b - Math.floor(b);
  if (b < 0) b += 1;
  return b;
}

function drawMoon() {
  const svg = document.getElementById('moon-svg');
  const group = document.getElementById('moon-group');
  const backPath = document.getElementById('moonback');
  const litPath = document.getElementById('moonlit');

  if (!OPTIONS.moon) {
    svg.style.display = 'none';
    return;
  }
  svg.style.display = 'block';

  const R = OPTIONS.moonSize;
  const moonX = canvas.width - 80;
  const moonY = 70;

  const phase = getMoonPhase(new Date()); // 0..1, 0/1=new, 0.5=full

  // tingletech approach: phase 0..1 maps to a cycle of 4 quarters.
  // rx (the horizontal radius of the terminator ellipse) goes 0 -> R -> 0 -> R -> 0
  // across the 4 quarters, and sweep flags determine bulge direction (waxing/waning, gibbous/crescent).
  const t = phase * 4; // 0..4
  const quarter = Math.floor(t) % 4; // 0,1,2,3
  const f = t - Math.floor(t); // 0..1 within quarter

  let rx, sweep1, sweep2;
  // quarter 0: new -> first quarter (crescent growing, rx: 0 -> R)
  // quarter 1: first quarter -> full (gibbous growing, rx: R -> 0, other sweep)
  // quarter 2: full -> last quarter (gibbous shrinking, rx: 0 -> R)
  // quarter 3: last quarter -> new (crescent shrinking, rx: R -> 0, other sweep)
  switch (quarter) {
    case 0: rx = f * R;       sweep1 = 1; sweep2 = 0; break;
    case 1: rx = (1 - f) * R; sweep1 = 0; sweep2 = 0; break;
    case 2: rx = f * R;       sweep1 = 0; sweep2 = 1; break;
    default: rx = (1 - f) * R; sweep1 = 1; sweep2 = 1; break;
  }

  // Two arcs from top (cx, cy-R) to bottom (cx, cy+R):
  // - outer arc: fixed radius R, sweeping one side (right half)
  // - inner arc: radius rx (varies), with sweep flags controlling bulge direction
  const top = `${moonX},${moonY - R}`;
  const bottom = `${moonX},${moonY + R}`;

  // back (dark) full circle
  backPath.setAttribute('d',
    `M${top} A${R},${R} 0 1,1 ${bottom} A${R},${R} 0 1,1 ${top}`
  );

  // lit shape: right side fixed arc + variable terminator arc
  litPath.setAttribute('d',
    `M${top} A${R},${R} 0 1,1 ${bottom} A${rx},${R} 0 1,${sweep2} ${top}`
  );

  // glow
  litPath.style.filter = 'drop-shadow(0 0 12px rgba(253,246,216,0.6))';
}

function seededRandom(seed) {
  // better hash to avoid correlation between nearby seeds
  let x = Math.sin(seed * 12.9898 + 78.233) * 43758.5453;
  return x - Math.floor(x);
}

function isWindowLit(buildingId, wx, wy) {
  if (!OPTIONS.windowFlicker) return true;
  const seed = buildingId * 9301 + wx * 49297 + wy * 233280;
  // each window gets its own period (~2-5s) and phase offset
  const period = 120 + Math.floor(seededRandom(seed) * 180); // 120-300 frames
  const phase = Math.floor(seededRandom(seed + 1) * period);
  const tick = Math.floor((frameCount + phase) / period);
  const r = seededRandom(seed + tick * 7919);
  return r > 0.25; // ~75% chance lit at any given tick
}

function initRain() {
  raindrops = [];
  if (!OPTIONS.rain) return;
  for (let i=0;i<100;i++) {
    raindrops.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      len: 10 + Math.random()*15,
      speed: 4 + Math.random()*6
    });
  }
}

if (typeof OPTIONS === 'undefined') {
  console.warn('options.js failed to load, using defaults');
  window.OPTIONS = {
    superSpeed: 3,
    buildingGapRange: [180, 260],
    flapStrength: -7,
    verticalGap: 150,
    supermanImageUrl: null,
    supermanHeigth: 24,
    supermanWidth: 24,
    rain: true,
    windowFlicker: true,
    moon: true,
    moonSize: 30,
    autopilot: true
  };
}

let superman = { x: 100, y: 300, vy: 0, width: OPTIONS.supermanWidth, height: OPTIONS.supermanHeigth, img: null };
const gravity = 0.4;
let buildings = [];
let gap = OPTIONS.verticalGap;
let buildingWidth = 70;
let speed = OPTIONS.superSpeed;

if (OPTIONS.supermanImageUrl) {
  superman.img = new Image();

  const processImage = (imgEl) => {
    try {
      const off = document.createElement('canvas');
      off.width = imgEl.width;
      off.height = imgEl.height;
      const octx = off.getContext('2d');
      octx.drawImage(imgEl, 0, 0);
      const imgData = octx.getImageData(0,0,off.width,off.height);
      const d = imgData.data;
      const threshold = 235;
      for (let i=0; i<d.length; i+=4) {
        if (d[i] > threshold && d[i+1] > threshold && d[i+2] > threshold) {
          d[i+3] = 0;
        }
      }
      octx.putImageData(imgData, 0, 0);
      const processed = new Image();
      processed.onload = () => { superman.img = processed; };
      processed.src = off.toDataURL();
    } catch (e) {
      console.warn('Could not strip white background (CORS); using image as-is.', e);
      superman.img = imgEl;
    }
  };

  // Fetch as blob first to avoid canvas tainting from cross-origin images.
  fetch(OPTIONS.supermanImageUrl)
    .then(r => r.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => { processImage(img); URL.revokeObjectURL(url); };
      img.onerror = () => { console.warn('Blob image failed to load'); };
      img.src = url;
    })
    .catch(err => {
      console.warn('Fetch failed, falling back to direct <img> load (no white-strip).', err);
      superman.img.onload = () => {};
      superman.img.onerror = () => { superman.img = null; };
      superman.img.src = OPTIONS.supermanImageUrl;
    });
}
let score = 0;
let gameOver = false;
let started = false;

function reset() {
  superman.y = 300;
  superman.vy = 0;
  buildings = [];
  for (let i=0;i<4;i++) addBuilding(400 + i*220);
  score = 0;
  gameOver = false;
  started = false;
  fireworks = [];
  particles = [];
  fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
  gameoverText.textContent = "";
  overlay.textContent = "Press SPACE to start";
  initRain();
  drawMoon();
}

let buildingIdCounter = 0;

function addBuilding(x) {
  const gapY = 100 + Math.random()*350;
  buildings.push({x:x, gapY:gapY, id: buildingIdCounter++});
}

function nextBuildingX() {
  const [minG, maxG] = OPTIONS.buildingGapRange;
  const gapDist = minG + Math.random()*(maxG-minG);
  return buildings[buildings.length-1].x + buildingWidth + gapDist;
}

function flap() {
  if (gameOver) { reset(); return; }
  if (!started) {
    started = true;
    overlay.textContent = "";
  }
  superman.vy = OPTIONS.flapStrength;
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); flap(); }
});

// Touch support for mobile devices
document.addEventListener('touchstart', e => {
  e.preventDefault();
  flap();
}, { passive: false });

// Responsive scaling: fit the fixed-resolution game container into the viewport
function resizeGame() {
  const container = document.getElementById('game-container');
  const baseW = 480, baseH = 640;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const scale = Math.min(vw / (baseW + 4), vh / (baseH + 4)); // +4 for border
  container.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', resizeGame);
window.addEventListener('orientationchange', resizeGame);
resizeGame();

function updateRain() {
  for (let r of raindrops) {
    r.y += r.speed;
    r.x -= speed * 0.5;
    if (r.y > canvas.height) {
      r.y = -10;
      r.x = Math.random()*canvas.width;
    }
    if (r.x < 0) r.x = canvas.width;
  }
}

function update() {
  if (gameOver) return;

  if (!started) {
    if (OPTIONS.autopilot) updateAutopilot();
    return;
  }

  superman.vy += gravity;
  superman.y += superman.vy;

  if (superman.y < 0 || superman.y + superman.height > canvas.height) {
    gameOver = true;
  }

  for (let b of buildings) {
    b.x -= speed;

    if (b.x + buildingWidth < 0) {
      buildings.shift();
      addBuilding(nextBuildingX());
      score++;
    }

    // collision
    if (superman.x + superman.width > b.x && superman.x < b.x + buildingWidth) {
      if (superman.y < b.gapY - gap/2 || superman.y + superman.height > b.gapY + gap/2) {
        gameOver = true;
      }
    }
  }

  if (gameOver) {
    overlay.textContent = "";
    if (gameoverText.textContent === "") {
      gameoverText.innerHTML = "Score: " + score + "<div style='font-size:18px;color:#fff;margin-top:10px;'>Press SPACE to restart</div>";
      launchFireworks();
    }
  }
}

function updateAutopilot() {
  superman.vy += gravity;
  superman.y += superman.vy;

  // keep superman within screen bounds
  if (superman.y < 0) { superman.y = 0; superman.vy = 0; }
  if (superman.y + superman.height > canvas.height) {
    superman.y = canvas.height - superman.height;
    superman.vy = 0;
  }

  for (let b of buildings) {
    b.x -= speed;
    if (b.x + buildingWidth < 0) {
      buildings.shift();
      addBuilding(nextBuildingX());
    }
  }

  // find the nearest building ahead (or current) to navigate towards its gap center
  let target = null;
  for (let b of buildings) {
    if (b.x + buildingWidth > superman.x) { target = b; break; }
  }

  if (target) {
    const gapCenter = target.gapY;
    const gapTop = target.gapY - gap/2;
    const gapBottom = target.gapY + gap/2;
    const margin = superman.height; // safety margin

    // predict next position if we don't flap
    const predictedY = superman.y + superman.vy + gravity;

    // flap if we're below center and falling, or about to breach safe bounds
    if (
      superman.y + superman.height > gapBottom - margin ||
      predictedY < gapTop + margin ||
      (superman.y > gapCenter && superman.vy >= 0)
    ) {
      if (superman.y + superman.height > gapBottom - margin || (superman.y > gapCenter && superman.vy > -1)) {
        superman.vy = OPTIONS.flapStrength;
      }
    }

    // also gently flap to stay near center if drifting too high above gap top
    if (superman.y < gapTop + margin && superman.vy < 0) {
      // let gravity pull down naturally, don't flap
    }
  }
}

function launchFireworks() {
  for (let i=0;i<6;i++) {
    fireworks.push({
      x: Math.random()*fwCanvas.width,
      y: fwCanvas.height,
      targetY: 100 + Math.random()*200,
      vy: -(4 + Math.random()*3),
      color: `hsl(${Math.random()*360},100%,55%)`,
      delay: i*15
    });
  }
}

function updateFireworks() {
  fwCtx.fillStyle = "rgba(0,0,0,0.15)";
  fwCtx.fillRect(0,0,fwCanvas.width,fwCanvas.height);

  for (let i=fireworks.length-1;i>=0;i--) {
    const f = fireworks[i];
    if (f.delay > 0) { f.delay--; continue; }
    f.y += f.vy;
    fwCtx.fillStyle = f.color;
    fwCtx.beginPath();
    fwCtx.arc(f.x, f.y, 3, 0, Math.PI*2);
    fwCtx.fill();

    if (f.y <= f.targetY) {
      for (let j=0;j<40;j++) {
        const angle = (Math.PI*2/40)*j;
        const speedP = 1 + Math.random()*3;
        particles.push({
          x: f.x, y: f.y,
          vx: Math.cos(angle)*speedP,
          vy: Math.sin(angle)*speedP,
          color: f.color,
          life: 60
        });
      }
      fireworks.splice(i,1);
      // relaunch occasionally
      if (gameOver && Math.random() < 0.6) {
        fireworks.push({
          x: Math.random()*fwCanvas.width,
          y: fwCanvas.height,
          targetY: 80 + Math.random()*220,
          vy: -(4 + Math.random()*3),
          color: `hsl(${Math.random()*360},100%,55%)`,
          delay: Math.random()*40
        });
      }
    }
  }

  for (let i=particles.length-1;i>=0;i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life--;
    fwCtx.globalAlpha = Math.max(p.life/60,0);
    fwCtx.fillStyle = p.color;
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, 2, 0, Math.PI*2);
    fwCtx.fill();
    fwCtx.globalAlpha = 1;
    if (p.life <= 0) particles.splice(i,1);
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // sky gradient drawn via CSS background

  // moon drawn via SVG overlay (see drawMoon)

  // buildings
  ctx.fillStyle = "#222";
  for (let b of buildings) {
    ctx.fillRect(b.x, 0, buildingWidth, b.gapY - gap/2);
    ctx.fillRect(b.x, b.gapY + gap/2, buildingWidth, canvas.height - (b.gapY + gap/2));
    // windows
    for (let wy=10; wy<b.gapY-gap/2; wy+=20) {
      for (let wx=5; wx<buildingWidth-5; wx+=15) {
        ctx.fillStyle = isWindowLit(b.id, wx, wy) ? "#ffd700" : "#3a3a2a";
        ctx.fillRect(b.x+wx, wy, 5, 8);
      }
    }
    for (let wy=b.gapY+gap/2+10; wy<canvas.height; wy+=20) {
      for (let wx=5; wx<buildingWidth-5; wx+=15) {
        ctx.fillStyle = isWindowLit(b.id, wx, wy) ? "#ffd700" : "#3a3a2a";
        ctx.fillRect(b.x+wx, wy, 5, 8);
      }
    }
    ctx.fillStyle = "#222";
  }

  // superman (simple shape)
  ctx.save();
  ctx.translate(superman.x+superman.width/2, superman.y+superman.height/2);

  if (superman.img && superman.img.complete && superman.img.naturalWidth > 0) {
    ctx.drawImage(superman.img, -superman.width/2, -superman.height/2, superman.width, superman.height);
  } else {
  // cape
  ctx.fillStyle = "#d40000";
  ctx.beginPath();
  ctx.moveTo(-12,-6);
  ctx.lineTo(-26,10);
  ctx.lineTo(-12,8);
  ctx.closePath();
  ctx.fill();
  // body
  ctx.fillStyle = "#0033a0";
  ctx.fillRect(-12,-12,24,24);
  // emblem
  ctx.fillStyle = "#ffd700";
  ctx.beginPath();
  ctx.arc(0,0,5,0,Math.PI*2);
  ctx.fill();
  }
  ctx.restore();

  // score
  ctx.fillStyle = "#fff";
  ctx.font = "20px sans-serif";
  ctx.fillText("Score: " + score, 10, 25);

  // rain
  if (OPTIONS.rain) {
    ctx.strokeStyle = "rgba(174,194,224,0.5)";
    ctx.lineWidth = 1;
    for (let r of raindrops) {
      ctx.beginPath();
      ctx.moveTo(r.x, r.y);
      ctx.lineTo(r.x - 2, r.y + r.len);
      ctx.stroke();
    }
  }
}

function loop() {
  frameCount++;
  update();
  if (OPTIONS.rain) updateRain();
  draw();
  if (gameOver) updateFireworks();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>
</body>
</html>
